name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Rustfmt
        working-directory: src-tauri
        run: cargo +nightly fmt --all -- --check

  frontend:
    name: Frontend
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Install JS dependencies
        run: deno install
      - name: Typecheck and build
        run: deno task build
      - name: Test
        run: deno task test

  check:
    name: Check (${{ matrix.name }})
    needs: [ fmt, frontend ]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - name: Windows x86_64
            runner: windows-2025
            target: x86_64-pc-windows-msvc
          - name: macOS aarch64
            runner: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: ${{ matrix.target }}

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install JS dependencies
        run: deno install

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Build frontend (produces dist/)
        run: deno task build

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        working-directory: src-tauri
        run: cargo test --workspace
