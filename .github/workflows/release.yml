name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS aarch64
            runner: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin --bundles dmg"
          - name: Linux x86_64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: "--bundles deb,rpm,appimage"
          - name: Windows x86_64
            runner: windows-2025
            target: x86_64-pc-windows-msvc
            args: "--bundles nsis,msi"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            rpm

      - name: Install JS dependencies
        run: deno install

      - name: Build bundles
        uses: tauri-apps/tauri-action@v0
        env:
          # Code-signing secrets - wired now, no-op when secrets are unset.
          # Tauri updater signing
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          tauriScript: deno task tauri
          args: ${{ matrix.args }}

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.target }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Update release draft and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Find the draft release created by release-drafter.
          DRAFT_ID=$(gh api repos/${GH_REPO}/releases \
            --jq '.[] | select(.draft == true) | .id' \
            | head -1)

          if [ -n "$DRAFT_ID" ]; then
            # Update the draft: set the tag, name, and publish it.
            gh api -X PATCH "repos/${GH_REPO}/releases/${DRAFT_ID}" \
              -f tag_name="${TAG}" \
              -f name="${TAG}" \
              -F draft=false
            RELEASE_ID="$DRAFT_ID"
            echo "Published existing draft release (id=${RELEASE_ID})"
          else
            # No draft found - create a new release with auto-generated notes.
            RELEASE_ID=$(gh api repos/${GH_REPO}/releases \
              -f tag_name="${TAG}" \
              -f name="${TAG}" \
              -F generate_release_notes=true \
              -F draft=false \
              --jq '.id')
            echo "Created new release (id=${RELEASE_ID})"
          fi

          # Upload all artifacts to the release.
          for FILE in artifacts/*; do
            echo "Uploading ${FILE}..."
            gh release upload "${TAG}" "${FILE}" --clobber
          done
